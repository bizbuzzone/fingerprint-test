<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CK26 Fingerprint v2 — Enhanced</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --green: #3fb950;
    --red: #f85149; --yellow: #d29922; --blue: #58a6ff;
    --purple: #bc8cff; --header-bg: #1c2128;
    --mono: "SF Mono", "Menlo", "Consolas", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5; padding: 12px;
    -webkit-text-size-adjust: 100%;
  }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: var(--blue); }
  .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 12px; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .btn {
    background: var(--blue); color: #fff; border: none; border-radius: 6px;
    padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent; flex: 1; min-width: 120px; text-align: center;
  }
  .btn:active { opacity: 0.7; }
  .btn.copied { background: var(--green); }
  .btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .device-info {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 12px; font-size: 12px; color: var(--text-dim);
    word-break: break-all; font-family: var(--mono); line-height: 1.7;
  }
  .device-info strong { color: var(--text); }
  .progress-bar {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 12px; display: none;
  }
  .progress-bar.active { display: block; }
  .progress-track { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; margin-top: 6px; }
  .progress-fill { background: var(--blue); height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s ease; }
  .progress-text { font-size: 12px; color: var(--text-dim); }

  /* Dashboard */
  .dashboard { display: none; margin-bottom: 16px; }
  .dashboard.active { display: block; }
  .dash-header {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; margin-bottom: 8px; text-align: center;
  }
  .dash-total { font-size: 24px; font-weight: 700; }
  .dash-total.perfect { color: var(--green); }
  .dash-total.good { color: var(--yellow); }
  .dash-total.poor { color: var(--red); }
  .dash-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
  .dash-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; font-size: 11px;
  }
  .dash-card .cat-name { color: var(--text-dim); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dash-card .cat-pct { font-weight: 700; font-size: 14px; }
  .dash-card .cat-pct.match { color: var(--green); }
  .dash-card .cat-pct.partial { color: var(--yellow); }
  .dash-card .cat-pct.diff { color: var(--red); }

  .summary-bar {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-bottom: 12px; display: none;
  }
  .summary-bar.active { display: block; }
  .summary-total { font-size: 18px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
  .summary-detail { font-size: 12px; color: var(--text-dim); }

  .category { margin-bottom: 12px; }
  .category-header {
    background: var(--header-bg); border: 1px solid var(--border);
    border-radius: 8px 8px 0 0; padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  .category-header.collapsed { border-radius: 8px; }
  .category-header h2 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .category-count {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    white-space: nowrap; background: rgba(255,255,255,0.06);
    padding: 2px 8px; border-radius: 10px;
  }
  .chevron { color: var(--text-dim); font-size: 12px; transition: transform 0.2s; margin-left: 8px; }
  .category-header.collapsed .chevron { transform: rotate(-90deg); }
  .category-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
  .category-body.collapsed { display: none; }
  .row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 6px 12px; border-bottom: 1px solid var(--border); gap: 8px;
  }
  .row:last-child { border-bottom: none; }
  .row:nth-child(even) { background: rgba(255,255,255,0.02); }
  .row-key { font-size: 12px; font-family: var(--mono); color: var(--text-dim); flex-shrink: 0; max-width: 40%; word-break: break-all; }
  .row-value { font-size: 12px; font-family: var(--mono); color: var(--text); text-align: right; word-break: break-all; max-width: 35%; flex: 1; min-width: 0; }
  .row-value.hash { color: var(--purple); }
  .row-value.na { color: var(--text-dim); font-style: italic; }
  .row-value.list { text-align: left; font-size: 11px; line-height: 1.6; max-height: 150px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .row-value.error { color: var(--red); }
  .row-ref {
    font-size: 10px; font-family: var(--mono); text-align: right;
    min-width: 50px; flex-shrink: 0; font-weight: 600; padding: 1px 6px; border-radius: 4px;
  }
  .row-ref.match { color: var(--green); background: rgba(63,185,80,0.1); }
  .row-ref.differs { color: var(--red); background: rgba(248,81,73,0.1); }
  .row-ref.noref { color: var(--text-dim); }
  .hidden-canvas { position: absolute; left: -9999px; top: -9999px; }
  @media (max-width: 400px) { body { font-size: 13px; padding: 8px; } .row-key, .row-value { font-size: 11px; } }
</style>
</head>
<body>

<h1>Fingerprint v2 — Enhanced</h1>
<p class="subtitle">23 categories, 600+ values — CK26 vs Real Safari 26.3 with CreepJS-style detection tests
  | <a href="fonts_test.html" style="color:var(--blue);text-decoration:none;">Fonts &amp; SVG Test (2927 fonts)</a></p>

<div class="device-info" id="deviceInfo">Loading device info...</div>

<div class="controls">
  <button class="btn" id="btnRun" onclick="runAllTests()">Run Tests</button>
  <button class="btn secondary" id="btnSend" onclick="sendResults()" disabled>Send to Server</button>
  <button class="btn secondary" id="btnCopy" onclick="copyResults()" disabled>Copy Results</button>
</div>
<div id="sendStatus" style="font-size:12px;margin-top:4px;min-height:16px"></div>

<div class="progress-bar" id="progressBar">
  <div class="progress-text" id="progressText">Initializing...</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div class="dash-total" id="dashTotal">—</div>
    <div class="dash-sub" id="dashSub">vs Real Safari 26.3 reference</div>
  </div>
  <div class="dash-grid" id="dashGrid"></div>
</div>

<div class="summary-bar" id="summaryBar">
  <div class="summary-total" id="summaryTotal"></div>
  <div class="summary-detail" id="summaryDetail"></div>
</div>

<div id="results"></div>

<script>
'use strict';
// ===== fingerprint_v2.js — Part 1: Utilities & Reference Data =====

function djb2(str) {
  var h = 5381;
  for (var i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) & 0xFFFFFFFF;
  return (h >>> 0).toString(16).padStart(8, '0');
}

var MD5 = (function() {
  function safeAdd(x,y){var l=(x&0xFFFF)+(y&0xFFFF);return(((x>>16)+(y>>16)+(l>>16))<<16)|(l&0xFFFF);}
  function bitRotateLeft(n,c){return(n<<c)|(n>>>(32-c));}
  function md5cmn(q,a,b,x,s,t){return safeAdd(bitRotateLeft(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b);}
  function md5ff(a,b,c,d,x,s,t){return md5cmn((b&c)|((~b)&d),a,b,x,s,t);}
  function md5gg(a,b,c,d,x,s,t){return md5cmn((b&d)|(c&(~d)),a,b,x,s,t);}
  function md5hh(a,b,c,d,x,s,t){return md5cmn(b^c^d,a,b,x,s,t);}
  function md5ii(a,b,c,d,x,s,t){return md5cmn(c^(b|(~d)),a,b,x,s,t);}
  function binlMD5(x,len){
    x[len>>5]|=0x80<<(len%32);x[((len+64)>>>9<<4)+14]=len;
    var a=1732584193,b=-271733879,c=-1732584194,d=271733878;
    for(var i=0;i<x.length;i+=16){
      var oa=a,ob=b,oc=c,od=d;
      a=md5ff(a,b,c,d,x[i],7,-680876936);d=md5ff(d,a,b,c,x[i+1],12,-389564586);c=md5ff(c,d,a,b,x[i+2],17,606105819);b=md5ff(b,c,d,a,x[i+3],22,-1044525330);
      a=md5ff(a,b,c,d,x[i+4],7,-176418897);d=md5ff(d,a,b,c,x[i+5],12,1200080426);c=md5ff(c,d,a,b,x[i+6],17,-1473231341);b=md5ff(b,c,d,a,x[i+7],22,-45705983);
      a=md5ff(a,b,c,d,x[i+8],7,1770035416);d=md5ff(d,a,b,c,x[i+9],12,-1958414417);c=md5ff(c,d,a,b,x[i+10],17,-42063);b=md5ff(b,c,d,a,x[i+11],22,-1990404162);
      a=md5ff(a,b,c,d,x[i+12],7,1804603682);d=md5ff(d,a,b,c,x[i+13],12,-40341101);c=md5ff(c,d,a,b,x[i+14],17,-1502002290);b=md5ff(b,c,d,a,x[i+15],22,1236535329);
      a=md5gg(a,b,c,d,x[i+1],5,-165796510);d=md5gg(d,a,b,c,x[i+6],9,-1069501632);c=md5gg(c,d,a,b,x[i+11],14,643717713);b=md5gg(b,c,d,a,x[i],20,-373897302);
      a=md5gg(a,b,c,d,x[i+5],5,-701558691);d=md5gg(d,a,b,c,x[i+10],9,38016083);c=md5gg(c,d,a,b,x[i+15],14,-660478335);b=md5gg(b,c,d,a,x[i+4],20,-405537848);
      a=md5gg(a,b,c,d,x[i+9],5,568446438);d=md5gg(d,a,b,c,x[i+14],9,-1019803690);c=md5gg(c,d,a,b,x[i+3],14,-187363961);b=md5gg(b,c,d,a,x[i+8],20,1163531501);
      a=md5gg(a,b,c,d,x[i+13],5,-1444681467);d=md5gg(d,a,b,c,x[i+2],9,-51403784);c=md5gg(c,d,a,b,x[i+7],14,1735328473);b=md5gg(b,c,d,a,x[i+12],20,-1926607734);
      a=md5hh(a,b,c,d,x[i+5],4,-378558);d=md5hh(d,a,b,c,x[i+8],11,-2022574463);c=md5hh(c,d,a,b,x[i+11],16,1839030562);b=md5hh(b,c,d,a,x[i+14],23,-35309556);
      a=md5hh(a,b,c,d,x[i+1],4,-1530992060);d=md5hh(d,a,b,c,x[i+4],11,1272893353);c=md5hh(c,d,a,b,x[i+7],16,-155497632);b=md5hh(b,c,d,a,x[i+10],23,-1094730640);
      a=md5hh(a,b,c,d,x[i+13],4,681279174);d=md5hh(d,a,b,c,x[i],11,-358537222);c=md5hh(c,d,a,b,x[i+3],16,-722521979);b=md5hh(b,c,d,a,x[i+6],23,76029189);
      a=md5hh(a,b,c,d,x[i+9],4,-640364487);d=md5hh(d,a,b,c,x[i+12],11,-421815835);c=md5hh(c,d,a,b,x[i+15],16,530742520);b=md5hh(b,c,d,a,x[i+2],23,-995338651);
      a=md5ii(a,b,c,d,x[i],6,-198630844);d=md5ii(d,a,b,c,x[i+7],10,1126891415);c=md5ii(c,d,a,b,x[i+14],15,-1416354905);b=md5ii(b,c,d,a,x[i+5],21,-57434055);
      a=md5ii(a,b,c,d,x[i+12],6,1700485571);d=md5ii(d,a,b,c,x[i+3],10,-1894986606);c=md5ii(c,d,a,b,x[i+10],15,-1051523);b=md5ii(b,c,d,a,x[i+1],21,-2054922799);
      a=md5ii(a,b,c,d,x[i+8],6,1873313359);d=md5ii(d,a,b,c,x[i+15],10,-30611744);c=md5ii(c,d,a,b,x[i+6],15,-1560198380);b=md5ii(b,c,d,a,x[i+13],21,1309151649);
      a=md5ii(a,b,c,d,x[i+4],6,-145523070);d=md5ii(d,a,b,c,x[i+11],10,-1120210379);c=md5ii(c,d,a,b,x[i+2],15,718787259);b=md5ii(b,c,d,a,x[i+9],21,-343485551);
      a=safeAdd(a,oa);b=safeAdd(b,ob);c=safeAdd(c,oc);d=safeAdd(d,od);
    }
    return[a,b,c,d];
  }
  function str2binl(str){var o=[];for(var i=0;i<str.length*8;i+=8)o[i>>5]|=(str.charCodeAt(i/8)&0xFF)<<(i%32);return o;}
  function binl2hex(b){var h='0123456789abcdef',s='';for(var i=0;i<b.length*4;i++)s+=h.charAt((b[i>>2]>>((i%4)*8+4))&0xF)+h.charAt((b[i>>2]>>((i%4)*8))&0xF);return s;}
  return function(s){return binl2hex(binlMD5(str2binl(s),s.length*8));};
})();

// ===== Global state =====
var RESULTS = {
  tool: 'fingerprint_v2',
  version: '2.0',
  timestamp: '',
  device: {},
  categories: {},
  summary: { totalValues: 0, categoryCounts: {} }
};

var COMPARE_STATS = { total: 0, match: 0, differ: 0, noref: 0, perCategory: {} };

// ===== REFERENCE DATA: Real Safari 26.3 on iPhone 14 Pro Max (iOS 18.7) =====
// Loaded async from reference_data.json, fallback to inline subset
var REFERENCE = null;
var REFERENCE_LOADING = fetch('reference_data.json?v=' + Date.now()).then(function(r) {
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}).then(function(data) {
  REFERENCE = data.categories || data;
  console.log('[FPv2] Reference data loaded: ' + Object.keys(REFERENCE).length + ' categories');
}).catch(function(e) {
  console.warn('[FPv2] Could not load reference_data.json:', e.message, '— using inline fallback');
  REFERENCE = null;
});

// ===== Device info =====
(function showDeviceInfo() {
  var ua = navigator.userAgent;
  var el = document.getElementById('deviceInfo');
  el.innerHTML =
    '<strong>UA:</strong> ' + ua + '<br>' +
    '<strong>Platform:</strong> ' + navigator.platform + '<br>' +
    '<strong>Screen:</strong> ' + screen.width + 'x' + screen.height + ' @' + window.devicePixelRatio + 'x<br>' +
    '<strong>Viewport:</strong> ' + window.innerWidth + 'x' + window.innerHeight + '<br>' +
    '<strong>Date:</strong> ' + new Date().toISOString();
  RESULTS.device = {
    userAgent: ua, platform: navigator.platform,
    screen: screen.width + 'x' + screen.height,
    dpr: window.devicePixelRatio,
    viewport: window.innerWidth + 'x' + window.innerHeight
  };
})();

// ===== UI helpers =====
function updateProgress(pct, text) {
  var bar = document.getElementById('progressBar');
  bar.classList.add('active');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

function compareValue(catId, key, val) {
  if (!REFERENCE || !REFERENCE[catId]) return 'noref';
  var ref = REFERENCE[catId][key];
  if (ref === undefined) return 'noref';
  return String(val) === String(ref) ? 'match' : 'differs';
}

function addCategory(id, title, data) {
  RESULTS.categories[id] = data;
  var keys = Object.keys(data);
  RESULTS.summary.categoryCounts[id] = keys.length;
  RESULTS.summary.totalValues += keys.length;

  var catMatch = 0, catDiff = 0, catNoref = 0;
  var container = document.getElementById('results');
  var cat = document.createElement('div');
  cat.className = 'category'; cat.id = 'cat-' + id;

  var body = document.createElement('div');
  body.className = 'category-body';

  keys.forEach(function(key) {
    var val = data[key];
    var cmp = compareValue(id, key, val);
    if (cmp === 'match') { catMatch++; COMPARE_STATS.match++; COMPARE_STATS.total++; }
    else if (cmp === 'differs') { catDiff++; COMPARE_STATS.differ++; COMPARE_STATS.total++; }
    else { catNoref++; COMPARE_STATS.noref++; }

    var row = document.createElement('div'); row.className = 'row';
    var kEl = document.createElement('div'); kEl.className = 'row-key'; kEl.textContent = key;
    var vEl = document.createElement('div'); vEl.className = 'row-value';

    if (val === null || val === undefined) { vEl.className += ' na'; vEl.textContent = 'N/A'; }
    else if (typeof val === 'string' && val.startsWith('[ERROR]')) { vEl.className += ' error'; vEl.textContent = val; }
    else if (typeof val === 'string' && (key.toLowerCase().indexOf('hash') >= 0 || key.toLowerCase().indexOf('md5') >= 0 || key.toLowerCase().indexOf('djb2') >= 0)) { vEl.className += ' hash'; vEl.textContent = val; }
    else if (Array.isArray(val)) { vEl.className += ' list'; vEl.textContent = val.join(', '); }
    else if (typeof val === 'string' && val.length > 100) { vEl.className += ' list'; vEl.textContent = val; }
    else { vEl.textContent = String(val); }

    var refEl = document.createElement('div'); refEl.className = 'row-ref ' + cmp;
    refEl.textContent = cmp === 'match' ? 'MATCH' : cmp === 'differs' ? 'DIFF' : '—';

    row.appendChild(kEl); row.appendChild(vEl); row.appendChild(refEl);
    body.appendChild(row);
  });

  COMPARE_STATS.perCategory[id] = { match: catMatch, diff: catDiff, noref: catNoref, total: catMatch + catDiff };

  var header = document.createElement('div'); header.className = 'category-header';
  var matchPct = (catMatch + catDiff) > 0 ? Math.round(catMatch / (catMatch + catDiff) * 100) : -1;
  var matchLabel = matchPct >= 0 ? ' (' + matchPct + '% match)' : '';
  header.innerHTML = '<h2>' + title + '</h2><div><span class="category-count">' + keys.length + ' vals' + matchLabel + '</span><span class="chevron">&#9660;</span></div>';
  header.onclick = function() { body.classList.toggle('collapsed'); header.classList.toggle('collapsed'); };

  cat.appendChild(header); cat.appendChild(body); container.appendChild(cat);
}

function safe(fn) { try { return fn(); } catch(e) { return '[ERROR] ' + e.message; } }
function safeVal(fn) { try { var v = fn(); return v === undefined ? null : v; } catch(e) { return null; } }

// ===== 1. Navigator / Browser =====
function testNavigator() {
  updateProgress(3, 'Testing Navigator...');
  var d = {};
  d['userAgent'] = safe(function(){ return navigator.userAgent; });
  d['appVersion'] = safe(function(){ return navigator.appVersion; });
  d['platform'] = safe(function(){ return navigator.platform; });
  d['vendor'] = safe(function(){ return navigator.vendor; });
  d['vendorSub'] = safe(function(){ return navigator.vendorSub; });
  d['language'] = safe(function(){ return navigator.language; });
  d['languages'] = safe(function(){ return Array.from(navigator.languages); });
  d['hardwareConcurrency'] = safe(function(){ return navigator.hardwareConcurrency; });
  d['maxTouchPoints'] = safe(function(){ return navigator.maxTouchPoints; });
  d['deviceMemory'] = safeVal(function(){ return navigator.deviceMemory; });
  d['cookieEnabled'] = safe(function(){ return navigator.cookieEnabled; });
  d['doNotTrack'] = safeVal(function(){ return navigator.doNotTrack; });
  d['pdfViewerEnabled'] = safeVal(function(){ return navigator.pdfViewerEnabled; });
  d['webdriver'] = safe(function(){ return navigator.webdriver; });
  d['connection.effectiveType'] = safeVal(function(){ return navigator.connection && navigator.connection.effectiveType; });
  d['connection.downlink'] = safeVal(function(){ return navigator.connection && navigator.connection.downlink; });
  d['connection.rtt'] = safeVal(function(){ return navigator.connection && navigator.connection.rtt; });
  d['connection.saveData'] = safeVal(function(){ return navigator.connection && navigator.connection.saveData; });
  d['productSub'] = safe(function(){ return navigator.productSub; });
  d['product'] = safe(function(){ return navigator.product; });
  d['oscpu'] = safeVal(function(){ return navigator.oscpu; });
  d['buildID'] = safeVal(function(){ return navigator.buildID; });
  addCategory('navigator', '1. Navigator / Browser', d);
}

// ===== 2. Screen / Display =====
function testScreen() {
  updateProgress(7, 'Testing Screen / Display...');
  var d = {};
  d['screen.width'] = safe(function(){ return screen.width; });
  d['screen.height'] = safe(function(){ return screen.height; });
  d['screen.availWidth'] = safe(function(){ return screen.availWidth; });
  d['screen.availHeight'] = safe(function(){ return screen.availHeight; });
  d['screen.colorDepth'] = safe(function(){ return screen.colorDepth; });
  d['screen.pixelDepth'] = safe(function(){ return screen.pixelDepth; });
  d['devicePixelRatio'] = safe(function(){ return window.devicePixelRatio; });
  d['innerWidth'] = safe(function(){ return window.innerWidth; });
  d['innerHeight'] = safe(function(){ return window.innerHeight; });

      '  r.perfNowPrecision = Math.max.apply(null, samples);',
      '  // Globals available',
      '  r.hasIndexedDB = typeof indexedDB !== "undefined";',
      '  r.hasFetch = typeof fetch === "function";',
      '  r.hasWebSocket = typeof WebSocket !== "undefined";',
      '  r.hasCrypto = typeof crypto !== "undefined";',
      '  r.hasSubtle = typeof crypto !== "undefined" && typeof crypto.subtle !== "undefined";',
      '  r.hasOffscreenCanvas = typeof OffscreenCanvas !== "undefined";',
      '  r.hasBroadcastChannel = typeof BroadcastChannel !== "undefined";',
      '  r.hasTextEncoder = typeof TextEncoder !== "undefined";',
      '  r.hasAbortController = typeof AbortController !== "undefined";',
      '  r.hasStructuredClone = typeof structuredClone === "function";',
      '  r.hasWebAssembly = typeof WebAssembly !== "undefined";',
      '  r.hasCompressionStream = typeof CompressionStream !== "undefined";',
      '  // Worker scope toString',
      '  try { r.scopeToString = Object.prototype.toString.call(self); } catch(e) { r.scopeToString = "error"; }',
      '  self.postMessage(r);',
      '};'
    ].join('\n');

    try {
      var blob = new Blob([workerCode], { type: 'application/javascript' });
      var w = new Worker(URL.createObjectURL(blob));
      var timer = setTimeout(function() {
        d['worker_scope'] = 'timeout';
        addCategory('workerscope', '18. Worker Scope', d);
        w.terminate(); resolve();
      }, 5000);
      w.onmessage = function(e) {
        clearTimeout(timer);
        var r = e.data;
        Object.keys(r).forEach(function(k) { d['worker_' + k] = r[k]; });
        // Compute scope hash
        d['worker_scope_hash'] = djb2(JSON.stringify(r));
        addCategory('workerscope', '18. Worker Scope', d);
        w.terminate(); resolve();
      };
      w.onerror = function(e) {
        clearTimeout(timer);
        d['worker_scope'] = '[ERROR] ' + (e.message || 'unknown');
        addCategory('workerscope', '18. Worker Scope', d);
        w.terminate(); resolve();
      };
      w.postMessage('go');
    } catch(e) {
      d['worker_scope'] = '[ERROR] ' + e.message;
      addCategory('workerscope', '18. Worker Scope', d);
      resolve();
    }
  });
}

// ===== 21. iframe Cross-Context =====
function testIframeCrossContext() {
  updateProgress(90, 'Testing iframe Cross-Context...');
  var d = {};
  return new Promise(function(resolve) {
    try {
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none'; iframe.sandbox = 'allow-scripts allow-same-origin';
      iframe.srcdoc = '<html><body><script>parent.postMessage({type:"iframeReady"}, "*");<\/script></body></html>';
      var timer = setTimeout(function() {
        d['iframe_test'] = 'timeout';
        addCategory('iframe', '21. iframe Cross-Context', d);
        try { document.body.removeChild(iframe); } catch(e) {}
        resolve();
      }, 3000);

      window.addEventListener('message', function handler(e) {
        if (!e.data || e.data.type !== 'iframeReady') return;
        window.removeEventListener('message', handler);
        clearTimeout(timer);
        try {
          var iframeWin = iframe.contentWindow;
          // Compare prototype property counts
          var mainProtos = ['Array','Object','Function','String','Number','Promise','Map','Set'];
          var mainCounts = []; var iframeCounts = [];
          mainProtos.forEach(function(name) {
            try {
              var mc = Object.getOwnPropertyNames(window[name].prototype).length;
              var ic = Object.getOwnPropertyNames(iframeWin[name].prototype).length;
              mainCounts.push(mc); iframeCounts.push(ic);
              d['iframe_' + name + '_main'] = mc;
              d['iframe_' + name + '_iframe'] = ic;
              d['iframe_' + name + '_match'] = mc === ic;
            } catch(ex) {
              d['iframe_' + name] = '[ERROR]';
            }
          });
          d['iframe_prototype_counts_match'] = mainCounts.join(',') === iframeCounts.join(',');
          d['iframe_main_hash'] = djb2(mainCounts.join(','));
          d['iframe_iframe_hash'] = djb2(iframeCounts.join(','));
          // Function.toString cross-context
          try {
            var mainToStr = Function.prototype.toString.call(Array.prototype.push);
            var iframeToStr = iframeWin.Function.prototype.toString.call(iframeWin.Array.prototype.push);
            d['iframe_funcToString_match'] = mainToStr === iframeToStr;
            d['iframe_funcToString_main'] = mainToStr;
          } catch(ex) { d['iframe_funcToString'] = '[ERROR]'; }
        } catch(ex) {
          d['iframe_access'] = '[ERROR] ' + ex.message;
        }
        addCategory('iframe', '21. iframe Cross-Context', d);
        try { document.body.removeChild(iframe); } catch(e2) {}
        resolve();
      });
      document.body.appendChild(iframe);
    } catch(e) {
      d['iframe_test'] = '[ERROR] ' + e.message;
      addCategory('iframe', '21. iframe Cross-Context', d);
      resolve();
    }
  });
}

function testClientRects() {
  updateProgress(93, 'Testing Client Rects...');

    container.style.cssText = 'position:absolute;left:-9999px;top:-9999px;font-size:16px;line-height:normal;';
    document.body.appendChild(container);

    // Test various text samples for DOMRect fingerprinting
    var samples = [
      { text: 'mmmmmmmmmmlli', font: '16px Arial' },
      { text: 'The quick brown fox jumps over the lazy dog', font: '14px Georgia' },
      { text: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', font: '12px monospace' },
      { text: '\u0644\u0627 \u0625\u0644\u0647 \u0625\u0644\u0627 \u0627\u0644\u0644\u0647', font: '16px Arial' },
      { text: '\u3053\u3093\u306b\u3061\u306f\u4e16\u754c', font: '16px sans-serif' }
    ];

    var allRects = [];
    samples.forEach(function(s, idx) {
      var span = document.createElement('span');
      span.style.font = s.font;
      span.textContent = s.text;
      container.appendChild(span);
      var rect = span.getBoundingClientRect();
      var key = 'rect_' + idx;
      d[key + '_width'] = parseFloat(rect.width.toFixed(6));

      allRects.push(rect.width.toFixed(6) + 'x' + rect.height.toFixed(6));
      container.removeChild(span);
    });

    // Range-based rects (BrowserLeaks technique)
    var rangeEl = document.createElement('div');
    rangeEl.innerHTML = '<span style="font:16px Arial">Fingerprint</span><span style="font:14px Georgia">Test</span>';
    container.appendChild(rangeEl);
    var range = document.createRange();
    range.selectNode(rangeEl);
    var rangeRects = range.getClientRects();
    d['range_rects_count'] = rangeRects.length;
    if (rangeRects.length > 0) {
      d['range_rect0_width'] = parseFloat(rangeRects[0].width.toFixed(6));
      d['range_rect0_height'] = parseFloat(rangeRects[0].height.toFixed(6));
      allRects.push('range:' + rangeRects[0].width.toFixed(6));

    d['clientrects_hash'] = djb2(allRects.join(','));

// ===== 23. JS Engine Fingerprint =====
function testJSEngine() {
  updateProgress(96, 'Testing JS Engine Fingerprint...');
  var d = {};

  // Error stack format
  d['error_stack_style'] = safe(function() {
    try { undefined.x; } catch(e) {
      if (e.stack.indexOf('@') !== -1) return 'JSC/SpiderMonkey (@-style)';
      if (e.stack.indexOf('    at ') !== -1) return 'V8 (at-style)';
      return 'unknown';
    }
  });

  // Function.toString format
  d['native_toString'] = safe(function() { return Function.prototype.toString.call(Math.max); });
  d['arrow_toString'] = safe(function() { return (function(){}).toString(); });

  // Proxy detection (CreepJS technique)
  d['proxy_toString'] = safe(function() {
    var p = new Proxy(function(){}, {});
    return Function.prototype.toString.call(p);
  });

  // typeof document.all (the famous "falsy object")
  d['typeof_document_all'] = safe(function() { return typeof document.all; });

  // Intl quirks
  d['intl_numberFormat_maximumFractionDigits'] = safe(function() {
    return new Intl.NumberFormat('en', { maximumFractionDigits: 20 }).format(Math.PI);
  });
  d['intl_dateTimeFormat_locale'] = safe(function() {
    return new Intl.DateTimeFormat('en-US').resolvedOptions().locale;
  });
  d['intl_collator_usage'] = safe(function() {
    return new Intl.Collator('en').resolvedOptions().usage;
  });

  // eval behavior
  d['eval_indirect'] = safe(function() { var e = eval; return typeof e('1+1'); });

  // arguments behavior
  d['arguments_callee'] = safe(function() {
    return (function() { return typeof arguments.callee; })();
  });

  // Symbol description
  d['symbol_description'] = safe(function() { return Symbol('test').description; });
  d['symbol_toPrimitive'] = safe(function() { return typeof Symbol.toPrimitive; });

  // Object.is quirks
  d['object_is_neg0'] = safe(function() { return Object.is(-0, 0); });
  d['object_is_NaN'] = safe(function() { return Object.is(NaN, NaN); });

  // Array sort stability
  d['sort_stable'] = safe(function() {
    var arr = [];
    for (var i = 0; i < 20; i++) arr.push({ v: i % 3, i: i });
    arr.sort(function(a, b) { return a.v - b.v; });
    var indices = arr.map(function(x) { return x.i; });
    return indices.join(',');
  });

  // Regex quirks
  d['regex_toString'] = safe(function() { return /test/gi.toString(); });
  d['regex_dotall'] = safe(function() { return typeof /./s.dotAll; });

  // Generator support level
  d['generator_support'] = safe(function() {
    try { return eval('(function*(){yield 1})().next().value') === 1; }
    catch(e) { return false; }
  });

  // Async support level
  d['async_support'] = safe(function() {
    try { return eval('typeof (async function(){})') === 'function'; }
    catch(e) { return false; }
  });

  d['engine_hash'] = djb2(Object.values(d).map(function(v) { return String(v); }).join('|'));
  addCategory('jsengine', '23. JS Engine Fingerprint', d);
}

// =============================================================
// Main runner
// =============================================================
async function runAllTests() {
  var btn = document.getElementById('btnRun');
  btn.disabled = true; btn.textContent = 'Running...';
  document.getElementById('results').innerHTML = '';
  RESULTS.categories = {};
  RESULTS.summary = { totalValues: 0, categoryCounts: {} };
  RESULTS.timestamp = new Date().toISOString();
  COMPARE_STATS = { total: 0, match: 0, differ: 0, noref: 0, perCategory: {} };

  // Wait for reference data to load
  await REFERENCE_LOADING;

  try {
    // Original 14 categories (sync)
    testNavigator();
    testScreen();
    testCanvas();
    testWebGL();

    // Async audio
    await testAudio();

    // Sync block
    testFonts();
    testAPIs();
    testTiming();
    testCodecs();

    // Async storage + permissions
    await testStorage();
    await testPermissions();

    // Sync block
    testMath();
    testCSS();
    testExtra();

    // NEW: 9 CreepJS-style categories
    testPrototypes();
    await testStackDepth();
    testHeadless();
    await testWorkerScope();
    testSVGFonts();
    await testFontFaceLoad();
    await testIframeCrossContext();
    testClientRects();
    testJSEngine();

    // Done
    updateProgress(100, 'Complete!');

    // Summary bar
    var summaryBar = document.getElementById('summaryBar');
    summaryBar.classList.add('active');
    document.getElementById('summaryTotal').textContent = RESULTS.summary.totalValues + ' values collected across 23 categories';
    var counts = Object.keys(RESULTS.summary.categoryCounts).map(function(k) {
      return k + ': ' + RESULTS.summary.categoryCounts[k];
    }).join(' | ');
    document.getElementById('summaryDetail').textContent = counts;

    // Dashboard
    buildDashboard();

    // Enable buttons
    document.getElementById('btnCopy').disabled = false;
    document.getElementById('btnSend').disabled = false;

    // Auto-send (only on localhost — GitHub Pages returns 405)
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') sendResults();

  } catch(e) {
    console.error('Test runner error:', e);
    updateProgress(100, 'Error: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Run Tests Again';
}

function buildDashboard() {
  if (!REFERENCE || COMPARE_STATS.total === 0) return;
  var dash = document.getElementById('dashboard');
  dash.classList.add('active');
  var pct = Math.round(COMPARE_STATS.match / COMPARE_STATS.total * 100);
  var totalEl = document.getElementById('dashTotal');
  totalEl.textContent = pct + '% match (' + COMPARE_STATS.match + '/' + COMPARE_STATS.total + ')';
  totalEl.className = 'dash-total ' + (pct >= 95 ? 'perfect' : pct >= 80 ? 'good' : 'poor');
  document.getElementById('dashSub').textContent = COMPARE_STATS.differ + ' differences, ' + COMPARE_STATS.noref + ' no-reference — vs Real Safari 26.3';

  var grid = document.getElementById('dashGrid');
  grid.innerHTML = '';
  Object.keys(COMPARE_STATS.perCategory).forEach(function(cat) {
    var s = COMPARE_STATS.perCategory[cat];
    if (s.total === 0) return;
    var cp = Math.round(s.match / s.total * 100);
    var card = document.createElement('div'); card.className = 'dash-card';
    card.innerHTML = '<div class="cat-name">' + cat + '</div><div class="cat-pct ' +
      (cp >= 95 ? 'match' : cp >= 60 ? 'partial' : 'diff') + '">' + cp + '% (' + s.match + '/' + s.total + ')</div>';
    grid.appendChild(card);
  });
}

// =============================================================
// Send / Copy results
// =============================================================
function sendResults() {
  var btn = document.getElementById('btnSend');
  var status = document.getElementById('sendStatus');
  btn.disabled = true; btn.textContent = 'Sending...';
  status.style.color = '#8b949e'; status.textContent = 'Sending results to server...';
  var url = window.location.origin + '/collect?type=fingerprint_v2';
  fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(RESULTS) })
  .then(function(r) {
    if (r.ok) return r.json().then(function(data) {
      btn.textContent = 'Sent!'; status.style.color = '#3fb950';
      status.textContent = 'Saved as ' + (data.file || 'OK');
      setTimeout(function() { btn.textContent = 'Send to Server'; btn.disabled = false; }, 3000);
    });
    throw new Error('HTTP ' + r.status);
  }).catch(function(e) {
    btn.textContent = 'Send Failed'; btn.disabled = false;
    status.style.color = '#f85149'; status.textContent = 'Error: ' + e.message + ' — use Copy Results instead';
    setTimeout(function() { btn.textContent = 'Retry Send'; }, 2000);
  });
}

function copyResults() {
  var json = JSON.stringify(RESULTS, null, 2);
  var btn = document.getElementById('btnCopy');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(function() {
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy Results'; btn.classList.remove('copied'); }, 2000);
    }).catch(function() { fallbackCopy(json, btn); });
  } else { fallbackCopy(json, btn); }
}

function fallbackCopy(text, btn) {
  var ta = document.createElement('textarea'); ta.value = text;
  ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copy Results'; btn.classList.remove('copied'); }, 2000);
  } catch(e) { btn.textContent = 'Copy failed'; setTimeout(function() { btn.textContent = 'Copy Results'; }, 2000); }
  document.body.removeChild(ta);
}

// Auto-run when loaded from collection server
if (location.port === '8888') {
  runAllTests();
}
