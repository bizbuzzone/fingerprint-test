// CreepJS hashMini (FNV-1a variant)
const hashMini = (x) => {
    if (!x) return x;
    const json = JSON.stringify(x);
    const hash = json.split('').reduce((hash, char, i) => {
        return Math.imul(31, hash) + json.charCodeAt(i) | 0;
    }, 0x811c9dc5);
    return ('0000000' + (hash >>> 0).toString(16)).substr(-8);
};

// ===== SVGRect measurement (exact CreepJS methodology) =====
function getSVGDimensions(svgText) {
    const { width, height, y } = svgText.getBBox();
    const chars = getChars();
    const { width: charWidth, height: charHeight, y: charY } = svgText.getExtentOfChar(chars[0]);
    const subString = svgText.getSubStringLength(1, 2);
    const textLen = svgText.getComputedTextLength();
    return {
        width: Math.round(width),
        height: Math.round(height),
        y: Math.round(y),
        charWidth: Math.round(charWidth),
        charHeight: Math.round(charHeight),
        charY: Math.round(charY),
        subString: Math.round(subString),
        textLen: Math.round(textLen)
    };
}

// ===== TextMetrics measurement (exact CreepJS methodology) =====
function getTextMetrics(ctx, font) {
    ctx.font = '256px ' + font;
    const m = ctx.measureText(getChars());
    return {
        ascent: Math.round(m.actualBoundingBoxAscent),
        descent: Math.round(m.actualBoundingBoxDescent),
        left: Math.round(m.actualBoundingBoxLeft),
        right: Math.round(m.actualBoundingBoxRight),
        width: Math.round(m.width),
        fontAscent: Math.round(m.fontBoundingBoxAscent),
        fontDescent: Math.round(m.fontBoundingBoxDescent)
    };
}

// ===== DOMRect measurement =====
function getRectDimensions(span, range) {
    range.selectNodeContents(span);
    const client = span.getBoundingClientRect();
    const bounding = span.getBoundingClientRect();
    let clientRange, boundingRange;
    try { clientRange = range.getBoundingClientRect(); } catch(e) { clientRange = client; }
    try { boundingRange = range.getBoundingClientRect(); } catch(e) { boundingRange = bounding; }
    return {
        client: Math.round(client.width),
        bounding: Math.round(bounding.width),
        clientRange: Math.round(clientRange.width),
        boundingRange: Math.round(boundingRange.width)
    };
}

// ===== Pixel measurement =====
function getPixelDimensions(style) {
    return {
        pixel: Math.round(parseFloat(style.inlineSize || style.width || '0')),
        size: Math.round(parseFloat(style.blockSize || style.height || '0'))
    };
}

// ===== Length measurement =====
function getLengthDimensions(span) {
    return {
        offset: span.offsetWidth,
        client: span.clientWidth,
        scroll: span.scrollWidth
    };
}

// ===== SVG Emoji test (EXACT CreepJS src/svg/index.ts methodology) =====
async function runEmojiSVG() {
    out.textContent += '\n\n===== SVG EMOJI TEST (exact CreepJS) =====\n';
    out.textContent += '93 emojis, font-size: 200px, single SVG with <g>, scale(1.000999)\n\n';

    const emojiChars = EMOJIS.map(codes => String.fromCodePoint(...codes));

    // EXACT CreepJS structure: div > style + svg > g#svgBox > text*93
    const div = document.createElement('div');
    div.setAttribute('id', 'svg-container');
    div.innerHTML = `
        <style>
        #svg-container {
            position: absolute;
            left: -9999px;
            height: auto;
        }
        #svg-container .shift-svg {
            transform: scale(1.000999) !important;
        }
        .svgrect-emoji {
            font-family: ${CSS_FONT_FAMILY};
            font-size: 200px !important;
            height: auto;
            position: absolute !important;
            transform: scale(1.000999);
        }
        </style>
        <svg>
            <g id="svgBox">
                ${emojiChars.map(emoji => `<text x="32" y="32" class="svgrect-emoji">${emoji}</text>`).join('')}
            </g>
        </svg>
    `;
    document.body.appendChild(div);

    await new Promise(r => setTimeout(r, 100));

    // Get elements exactly like CreepJS
    const svgBox = document.getElementById('svgBox');
    const svgElems = [...svgBox.getElementsByClassName('svgrect-emoji')];

    // Measure all emojis — exact CreepJS logic
    const pattern = new Set();
    const emojiSet = new Set();
    const allWidths = [];

    svgElems.forEach((el, i) => {
        const emoji = emojiChars[i];
        const dimensions = '' + el.getComputedTextLength(); // CreepJS: string conversion
        allWidths.push({
            index: i,
            codes: EMOJIS[i],
            codePoints: EMOJIS[i].map(c => 'U+' + c.toString(16).toUpperCase()),
            width: el.getComputedTextLength(),
            widthStr: dimensions,
            isUnique: !pattern.has(dimensions)
        });
        if (!pattern.has(dimensions)) {
            pattern.add(dimensions);
            emojiSet.add(emoji);
        }
    });

    // Shift detection (exact CreepJS lied detection)
    const svgEmojiEl = svgElems[0];
    const initial = svgEmojiEl.getComputedTextLength();
    svgEmojiEl.classList.add('shift-svg');
    const shifted = svgEmojiEl.getComputedTextLength();
    svgEmojiEl.classList.remove('shift-svg');
    const unshifted = svgEmojiEl.getComputedTextLength();
    const lied = (initial - shifted) != (unshifted - shifted);

    // BBox of svgBox group (exact CreepJS: svgBox.getBBox())
    const bBox = svgBox.getBBox();
    const bBoxSum = bBox.x + bBox.y + bBox.width + bBox.height;

    // extentOfChar of first emoji (exact CreepJS: getExtentOfChar(EMOJIS[0]))
    let extentSum = 0;
    try {
        const ext = svgElems[0].getExtentOfChar(emojiChars[0]);
        extentSum = ext.x + ext.y + ext.width + ext.height;
    } catch(e) {}

    // subStringLength and computedTextLength of first emoji
    let subLen = 0, compLen = 0;
    try { subLen = svgElems[0].getSubStringLength(0, 10); } catch(e) {}
    try { compLen = svgElems[0].getComputedTextLength(); } catch(e) {}

    // System sum (exact CreepJS: 0.00001 * sum of unique pattern float values)
    const svgrectSystemSum = 0.00001 * [...pattern].map(w => parseFloat(w) || 0).reduce((a, b) => a + b, 0);

    // Output results
    out.textContent += 'Total emojis: ' + EMOJIS.length + '\n';
    out.textContent += 'Unique emojis: ' + emojiSet.size + '/' + EMOJIS.length + '\n';
    out.textContent += 'Unique widths: ' + pattern.size + '\n';
    out.textContent += 'Lied: ' + lied + '\n';
    out.textContent += 'bBoxSum: ' + bBoxSum + '\n';
    out.textContent += 'extentSum: ' + extentSum + '\n';
    out.textContent += 'subStringLength: ' + subLen + '\n';
    out.textContent += 'computedTextLength: ' + compLen + '\n';
    out.textContent += 'svgrectSystemSum: ' + svgrectSystemSum + '\n\n';

    // Show unique emojis
    const uniqueEmojis = allWidths.filter(e => e.isUnique);
    out.textContent += 'Unique emoji details:\n';
    uniqueEmojis.forEach(e => {
        out.textContent += '  [' + e.index + '] ' + e.codePoints.join(',') + ' w=' + e.width + '\n';
    });

    // Show ALL widths
    out.textContent += '\nAll ' + EMOJIS.length + ' emoji widths:\n';
    allWidths.forEach(e => {
        const marker = e.isUnique ? ' *UNIQUE*' : '';
        out.textContent += '  [' + e.index + '] ' + e.codePoints.join(',') + ' w=' + e.width + marker + '\n';
    });

    // Highlight key characters
    const keyChars = [9835, 9877, 169, 174, 8482];
    keyChars.forEach(cp => {
        const idx = EMOJIS.findIndex(codes => codes.length === 1 && codes[0] === cp);
        if (idx >= 0) {
            const e = allWidths[idx];
            out.textContent += '\n** U+' + cp.toString(16).toUpperCase() + ' (index ' + idx + '): w=' + e.width + ' unique=' + e.isUnique;
            if (!e.isUnique) {
                const sameWidth = allWidths.filter(o => o.widthStr === e.widthStr && o.index !== idx);
                out.textContent += ' shares_with=' + sameWidth.length + '_others';
            }
            out.textContent += '\n';
        }
    });

    // Cleanup
    div.remove();

    return {
        totalEmojis: EMOJIS.length,
        uniqueCount: emojiSet.size,
        uniqueWidthCount: pattern.size,
        lied: lied,
        bBoxSum: bBoxSum,
        extentSum: extentSum,
        subStringLength: subLen,
        computedTextLength: compLen,
        svgrectSystemSum: svgrectSystemSum,
        uniqueEmojis: uniqueEmojis.map(e => ({ index: e.index, codes: e.codes, width: e.width })),
        allWidths: allWidths.map(e => ({ index: e.index, codes: e.codes, width: e.width, unique: e.isUnique })),
        emojiSet: [...emojiSet].map(e => [...e].map(c => c.codePointAt(0)))
    };
}

    // FIX: Use --font CSS var for test fonts too (like CreepJS), not font-family directly
    // Actually re-reading CreepJS: it sets style.setProperty('--font', family) for ALL fonts
    // Let me verify by re-running with --font

    results.svgRect = {
        combined: { hash: hashMini([...svgCombined]), count: svgCombined.size, fonts: [...svgCombined] },

        charWidth: { hash: hashMini([...svgCharWidth]), count: svgCharWidth.size, fonts: [...svgCharWidth] },
        charHeight: { hash: hashMini([...svgCharHeight]), count: svgCharHeight.size, fonts: [...svgCharHeight] },
        charY: { hash: hashMini([...svgCharY]), count: svgCharY.size, fonts: [...svgCharY] },
        subString: { hash: hashMini([...svgSubString]), count: svgSubString.size, fonts: [...svgSubString] },
        textLen: { hash: hashMini([...svgTextLen]), count: svgTextLen.size, fonts: [...svgTextLen] },
        rawDimensions: svgDetected,
        baseDimensions: svgBase
    };

    out.textContent += 'SVGRect combined: ' + hashMini([...svgCombined]) + ' (' + svgCombined.size + '/' + list.length + ')\n';
    out.textContent += 'SVGRect width: ' + hashMini([...svgWidth]) + ' (' + svgWidth.size + ')\n';
    out.textContent += 'SVGRect charWidth: ' + hashMini([...svgCharWidth]) + ' (' + svgCharWidth.size + ')\n';
    out.textContent += 'SVGRect textLen: ' + hashMini([...svgTextLen]) + ' (' + svgTextLen.size + ')\n';
    out.textContent += 'SVGRect fonts: ' + [...svgCombined].join(', ') + '\n';

    svgDiv.remove();

    // ===== 2. TextMetrics (Canvas) =====
    bar.style.width = '35%';
    out.textContent += '\n--- TextMetrics ---\n';
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    const tmBase = {};
    baseFonts.forEach(font => { tmBase[font] = getTextMetrics(ctx, font); });

    const tmDetected = {};
    const tmCombined = new Set(), tmAscent = new Set(), tmDescent = new Set();
    const tmLeft = new Set(), tmRight = new Set(), tmWidth = new Set();
    const tmFontAscent = new Set(), tmFontDescent = new Set();

    families.forEach((family, i) => {
        const basefont = family.split(', ')[1];
        const dims = getTextMetrics(ctx, family);
        const font = family.match(/\'(.+)\'/)[1];
        const b = tmBase[basefont];

        if (dims.ascent != b.ascent || dims.descent != b.descent || dims.left != b.left ||
            dims.right != b.right || dims.width != b.width ||
            dims.fontAscent != b.fontAscent || dims.fontDescent != b.fontDescent) {
            tmCombined.add(font);
            tmDetected[font] = dims;
        }
        if (dims.ascent != b.ascent) tmAscent.add(font);
        if (dims.descent != b.descent) tmDescent.add(font);
        if (dims.left != b.left) tmLeft.add(font);
        if (dims.right != b.right) tmRight.add(font);
        if (dims.width != b.width) tmWidth.add(font);
        if (dims.fontAscent != b.fontAscent) tmFontAscent.add(font);
        if (dims.fontDescent != b.fontDescent) tmFontDescent.add(font);
    });

    results.textMetrics = {
        combined: { hash: hashMini([...tmCombined]), count: tmCombined.size, fonts: [...tmCombined] },
        ascent: { hash: hashMini([...tmAscent]), count: tmAscent.size },
        descent: { hash: hashMini([...tmDescent]), count: tmDescent.size },
        left: { hash: hashMini([...tmLeft]), count: tmLeft.size },
        right: { hash: hashMini([...tmRight]), count: tmRight.size },
        width: { hash: hashMini([...tmWidth]), count: tmWidth.size },
        fontAscent: { hash: hashMini([...tmFontAscent]), count: tmFontAscent.size },
        fontDescent: { hash: hashMini([...tmFontDescent]), count: tmFontDescent.size },
        rawDimensions: tmDetected,
        baseDimensions: tmBase
    };

    out.textContent += 'TextMetrics combined: ' + hashMini([...tmCombined]) + ' (' + tmCombined.size + '/' + list.length + ')\n';
    out.textContent += 'TextMetrics width: ' + hashMini([...tmWidth]) + ' (' + tmWidth.size + ')\n';
    out.textContent += 'TextMetrics fonts: ' + [...tmCombined].join(', ') + '\n';

    // ===== 3. DOMRect =====
    bar.style.width = '60%';
    out.textContent += '\n--- DOMRect ---\n';
    const drDiv = document.createElement('div');
    drDiv.setAttribute('id', 'font-fp-dr');
    document.body.appendChild(drDiv);

    drDiv.innerHTML =
        '<style>#font-fp-dr-detector { --font:""; position:absolute!important; left:-9999px!important; font-size:256px!important; font-style:normal!important; font-weight:normal!important; letter-spacing:normal!important; line-break:auto!important; line-height:normal!important; text-transform:none!important; text-align:left!important; text-decoration:none!important; text-shadow:none!important; white-space:normal!important; word-break:normal!important; word-spacing:normal!important; font-family:var(--font); }</style>' +
        '<span id="font-fp-dr-detector">' + chars + '</span>';

    const span = document.getElementById('font-fp-dr-detector');
    const range = document.createRange();

    const drBase = {};
    baseFonts.forEach(font => {
        span.style.setProperty('--font', font);
        drBase[font] = getRectDimensions(span, range);
    });

    const drClient = new Set(), drBounding = new Set(), drClientRange = new Set(), drBoundingRange = new Set();

    families.forEach((family, i) => {
        span.style.setProperty('--font', family);
        const basefont = family.split(', ')[1];
        const dims = getRectDimensions(span, range);
        const font = family.match(/\'(.+)\'/)[1];
        const b = drBase[basefont];

        if (dims.client != b.client) drClient.add(font);
        if (dims.bounding != b.bounding) drBounding.add(font);
        if (dims.clientRange != b.clientRange) drClientRange.add(font);
        if (dims.boundingRange != b.boundingRange) drBoundingRange.add(font);
    });

    results.domRect = {
        client: { hash: hashMini([...drClient]), count: drClient.size, fonts: [...drClient] },
        bounding: { hash: hashMini([...drBounding]), count: drBounding.size },
        clientRange: { hash: hashMini([...drClientRange]), count: drClientRange.size },
        boundingRange: { hash: hashMini([...drBoundingRange]), count: drBoundingRange.size }
    };

    out.textContent += 'DOMRect client: ' + hashMini([...drClient]) + ' (' + drClient.size + '/' + list.length + ')\n';
    drDiv.remove();

    // ===== 4. Pixels =====
    bar.style.width = '75%';
    out.textContent += '\n--- Pixels ---\n';
    const pxDiv = document.createElement('div');
    pxDiv.setAttribute('id', 'font-fp-px');
    document.body.appendChild(pxDiv);

    pxDiv.innerHTML =
        '<style>#font-fp-px-detector { --font:""; position:absolute!important; left:-9999px!important; font-size:256px!important; font-style:normal!important; font-weight:normal!important; letter-spacing:normal!important; line-break:auto!important; line-height:normal!important; text-transform:none!important; text-align:left!important; text-decoration:none!important; text-shadow:none!important; white-space:normal!important; word-break:normal!important; word-spacing:normal!important; font-family:var(--font); }</style>' +
        '<span id="font-fp-px-detector">' + chars + '</span>';

    const pxSpan = document.getElementById('font-fp-px-detector');
    const pxStyle = getComputedStyle(pxSpan);

    const pxBase = {};
    baseFonts.forEach(font => {
        pxSpan.style.setProperty('--font', font);
        pxBase[font] = getPixelDimensions(pxStyle);
    });

    const pxPixel = new Set(), pxSize = new Set();

    families.forEach((family, i) => {
        pxSpan.style.setProperty('--font', family);
        const basefont = family.split(', ')[1];
        const dims = getPixelDimensions(pxStyle);
        const font = family.match(/\'(.+)\'/)[1];
        const b = pxBase[basefont];

        if (dims.pixel != b.pixel) pxPixel.add(font);
        if (dims.size != b.size) pxSize.add(font);
    });

    results.pixels = {
        pixel: { hash: hashMini([...pxPixel]), count: pxPixel.size, fonts: [...pxPixel] },
        size: { hash: hashMini([...pxSize]), count: pxSize.size }
    };

    out.textContent += 'Pixels pixel: ' + hashMini([...pxPixel]) + ' (' + pxPixel.size + '/' + list.length + ')\n';
    pxDiv.remove();

    // ===== 5. Lengths =====
    bar.style.width = '88%';
    out.textContent += '\n--- Lengths ---\n';
    const lDiv = document.createElement('div');
    lDiv.setAttribute('id', 'font-fp-l');
    document.body.appendChild(lDiv);

    lDiv.innerHTML =
        '<style>#font-fp-l-detector { --font:""; position:absolute!important; left:-9999px!important; font-size:256px!important; font-style:normal!important; font-weight:normal!important; letter-spacing:normal!important; line-break:auto!important; line-height:normal!important; text-transform:none!important; text-align:left!important; text-decoration:none!important; text-shadow:none!important; white-space:normal!important; word-break:normal!important; word-spacing:normal!important; font-family:var(--font); display:inline-block; }</style>' +
        '<span id="font-fp-l-detector">' + chars + '</span>';

    const lSpan = document.getElementById('font-fp-l-detector');
    const lBase = {};
    baseFonts.forEach(font => {
        lSpan.style.setProperty('--font', font);
        lBase[font] = getLengthDimensions(lSpan);
    });

    const lOffset = new Set(), lClient = new Set(), lScroll = new Set();

    families.forEach((family, i) => {
        lSpan.style.setProperty('--font', family);
        const basefont = family.split(', ')[1];
        const dims = getLengthDimensions(lSpan);
        const font = family.match(/\'(.+)\'/)[1];
        const b = lBase[basefont];

        if (dims.offset != b.offset) lOffset.add(font);
        if (dims.client != b.client) lClient.add(font);
        if (dims.scroll != b.scroll) lScroll.add(font);
    });

    results.lengths = {
        offset: { hash: hashMini([...lOffset]), count: lOffset.size, fonts: [...lOffset] },
        client: { hash: hashMini([...lClient]), count: lClient.size },
        scroll: { hash: hashMini([...lScroll]), count: lScroll.size }
    };

    out.textContent += 'Lengths offset: ' + hashMini([...lOffset]) + ' (' + lOffset.size + '/' + list.length + ')\n';
    lDiv.remove();

    // ===== 6. Diff Analysis =====
    bar.style.width = '95%';
    out.textContent += '\n\n===== DIFF ANALYSIS =====\n';

    const svgOnly = [...svgCombined].filter(f => !tmCombined.has(f));
    const tmOnly = [...tmCombined].filter(f => !svgCombined.has(f));
    const both = [...svgCombined].filter(f => tmCombined.has(f));

    out.textContent += 'SVG detected ' + svgCombined.size + ' fonts, TextMetrics detected ' + tmCombined.size + ' fonts\n';
    out.textContent += 'Both: ' + both.length + '\n';
    out.textContent += 'SVG-only (' + svgOnly.length + '): ' + svgOnly.join(', ') + '\n';
    out.textContent += 'TextMetrics-only (' + tmOnly.length + '): ' + tmOnly.join(', ') + '\n';

    if (svgOnly.length > 0) {
        out.textContent += '\n--- SVG-only font dimensions ---\n';
        for (const font of svgOnly) {
            const d = svgDetected[font];
            out.textContent += font + ': w=' + d.width + ' h=' + d.height + ' y=' + d.y +
                ' cw=' + d.charWidth + ' ch=' + d.charHeight + ' cy=' + d.charY +
                ' ss=' + d.subString + ' tl=' + d.textLen + '\n';
            // Also show base font dimensions for comparison
            const baseFont = families.find(f => f.includes("'" + font + "'"));
            if (baseFont) {
                const bf = baseFont.split(', ')[1];
                const b = svgBase[bf];
                out.textContent += '  base(' + bf + '): w=' + b.width + ' h=' + b.height + ' y=' + b.y +
                    ' cw=' + b.charWidth + ' ch=' + b.charHeight + ' cy=' + b.charY +
                    ' ss=' + b.subString + ' tl=' + b.textLen + '\n';
            }
        }
    }

    results.diff = {
        svgOnly: svgOnly,
        tmOnly: tmOnly,
        svgOnlyCount: svgOnly.length,
        tmOnlyCount: tmOnly.length,
        bothCount: both.length
    };

    // ===== 7. SVG Emoji Test =====
    bar.style.width = '95%';
    results.svgEmoji = await runEmojiSVG();

    // ===== 8. FontFace.load() — CreepJS main fonts module =====
    bar.style.width = '97%';
    out.textContent += '\n\n===== FONTFACE.LOAD() TEST =====\n';
    out.textContent += 'CreepJS main module: ~60 curated fonts via FontFace.load()\n\n';

    // Exact CreepJS font list (Apple + Linux + Android + Desktop apps)
    const creepjsFontList = [
        // Apple fonts (macOS 10.9 - Ventura 13)
        'American Typewriter Semibold','Futura Bold','Geneva','Helvetica Neue',
        'SignPainter-HouseScript Semibold','PingFang HK Light',
        'Kohinoor Devanagari Medium','Luminari','Galvji','MuktaMahee Regular',
        'InaiMathi Bold',
        // Linux
        'Arimo','Chilanka','Cousine','Jomolhari','MONO','Noto Color Emoji','Ubuntu',
        // Android
        'Dancing Script','Droid Sans Mono','Roboto',
        // Windows (won't exist on iOS but test anyway)
        'Segoe Fluent Icons','Ink Free','Bahnschrift','Segoe MDL2 Assets',
        'HoloLens MDL2 Assets','Leelawadee UI','Javanese Text','Segoe UI Emoji',
        'Aldhabi','Gadugi','Myanmar Text','Nirmala UI','Lucida Console','Cambria Math',
        // Desktop apps
        'MS Outlook','ZWAdobeF','Amiri','KACSTOffice','Liberation Mono','Source Code Pro',
        'DejaVu Sans','Gentium Book Basic','OpenSymbol',
        // Thai
        'Bai Jamjuree','Chakra Petch','Charmonman','Fahkwang','K2D','Kodchasan','KoHo','Sarabun','Srisakdi'
    ].sort();

    try {
        const fontFaceList = creepjsFontList.map(font => new FontFace(font, 'local("' + font + '")'));
        const responses = await Promise.allSettled(fontFaceList.map(font => font.load()));
        const fontsLoaded = responses.reduce((acc, font) => {
            if (font.status == 'fulfilled') acc.push(font.value.family);
            return acc;
        }, []);

        // Also try document.fonts.check()
        const fontsChecked = creepjsFontList.reduce((acc, font) => {
            try {
                if (document.fonts.check('0px "' + font + '"')) acc.push(font);
            } catch(e) {}
            return acc;
        }, []);

        const allDetected = [...new Set([...fontsChecked, ...fontsLoaded])].sort();

        results.fontFaceLoad = {
            tested: creepjsFontList.length,
            loadedCount: fontsLoaded.length,
            loaded: fontsLoaded.sort(),
            checkedCount: fontsChecked.length,
            checked: fontsChecked.sort(),
            combinedCount: allDetected.length,
            combined: allDetected
        };

        out.textContent += 'FontFace.load(): ' + fontsLoaded.length + '/' + creepjsFontList.length + ' loaded\n';
        out.textContent += 'document.fonts.check(): ' + fontsChecked.length + '/' + creepjsFontList.length + ' found\n';
        out.textContent += 'Combined: ' + allDetected.length + ' fonts\n';
        out.textContent += 'Loaded: ' + fontsLoaded.sort().join(', ') + '\n';
        out.textContent += 'Checked: ' + fontsChecked.sort().join(', ') + '\n';
    } catch(e) {
        out.textContent += 'FontFace.load() error: ' + e.message + '\n';
        results.fontFaceLoad = { error: e.message };
    }

    // ===== Summary =====
    results.meta = {
        userAgent: navigator.userAgent,
        timestamp: new Date().toISOString(),
        platform: navigator.platform,
        devicePixelRatio: window.devicePixelRatio,
        screen: { w: screen.width, h: screen.height },
        totalFonts: list.length,
        totalFamilies: families.length
    };

    window._results = results;
    bar.style.width = '100%';

    out.textContent += '\n\n===== SUMMARY =====\n';
    out.textContent += 'Total fonts tested: ' + list.length + '\n';
    out.textContent += 'SVGRect combined: ' + results.svgRect.combined.hash + ' (' + results.svgRect.combined.count + '/' + list.length + ')\n';
    out.textContent += 'TextMetrics combined: ' + results.textMetrics.combined.hash + ' (' + results.textMetrics.combined.count + '/' + list.length + ')\n';
    out.textContent += 'DOMRect client: ' + results.domRect.client.hash + ' (' + results.domRect.client.count + '/' + list.length + ')\n';
    out.textContent += 'Pixels pixel: ' + results.pixels.pixel.hash + ' (' + results.pixels.pixel.count + '/' + list.length + ')\n';
    out.textContent += 'Lengths offset: ' + results.lengths.offset.hash + ' (' + results.lengths.offset.count + '/' + list.length + ')\n';
    out.textContent += 'SVG Emoji unique: ' + results.svgEmoji.uniqueCount + '/' + results.svgEmoji.totalEmojis + '\n';
    out.textContent += '\nTarget (Real 14PM):\n';
    out.textContent += '  SVGRect combined: 187d5d1d (57/' + list.length + ')\n';
    out.textContent += '  TextMetrics combined: 187d5d1d (57/' + list.length + ')\n';
    out.textContent += '  SVG Emoji: CK26 must match Real (same unique count + widths)\n';
    out.textContent += '\nDone! Press "Copy JSON" for full data.\n';
}

async function runEmojiOnly() {
    out.textContent = 'Running SVG Emoji test only...\n';
    bar.style.width = '50%';
    const results = { svgEmoji: await runEmojiSVG() };
    results.meta = {
        userAgent: navigator.userAgent,
        timestamp: new Date().toISOString(),
        platform: navigator.platform,
        devicePixelRatio: window.devicePixelRatio,
    };
    window._results = results;
    bar.style.width = '100%';
    out.textContent += '\nDone! Press "Copy JSON" for full data.\n';
}

function copyJSON() {
    if (!window._results) {
        out.textContent = 'Run tests first!';
        return;
    }
    const json = JSON.stringify(window._results, null, 2);
    navigator.clipboard.writeText(json).then(() => {
        out.textContent = '(Copied to clipboard)\n\n' + json;
    }).catch(() => {
        out.textContent = json;
    });
}
</script>
</body>
</html>
