<script>
// ===== EXACT CreepJS font lists (fontList + extendedFontList = ~485 fonts) =====
const fontList = ["Andale Mono","Arial","Arial Black","Arial Hebrew","Arial MT","Arial Narrow","Arial Rounded MT Bold","Arial Unicode MS","Bitstream Vera Sans Mono","Book Antiqua","Bookman Old Style","Calibri","Cambria","Cambria Math","Century","Century Gothic","Century Schoolbook","Comic Sans","Comic Sans MS","Consolas","Courier","Courier New","Geneva","Georgia","Helvetica","Helvetica Neue","Impact","Lucida Bright","Lucida Calligraphy","Lucida Console","Lucida Fax","LUCIDA GRANDE","Lucida Handwriting","Lucida Sans","Lucida Sans Typewriter","Lucida Sans Unicode","Microsoft Sans Serif","Monaco","Monotype Corsiva","MS Gothic","MS Outlook","MS PGothic","MS Reference Sans Serif","MS Sans Serif","MS Serif","MYRIAD","MYRIAD PRO","Palatino","Palatino Linotype","Segoe Print","Segoe Script","Segoe UI","Segoe UI Light","Segoe UI Semibold","Segoe UI Symbol","Tahoma","Times","Times New Roman","Times New Roman PS","Trebuchet MS","Verdana","Wingdings","Wingdings 2","Wingdings 3"];

const extendedFontList = ["Abadi MT Condensed Light","Academy Engraved LET","ADOBE CASLON PRO","Adobe Garamond","ADOBE GARAMOND PRO","Agency FB","Aharoni","Albertus Extra Bold","Albertus Medium","Algerian","Amazone BT","American Typewriter","American Typewriter Condensed","AmerType Md BT","Andalus","Angsana New","AngsanaUPC","Antique Olive","Aparajita","Apple Chancery","Apple Color Emoji","Apple SD Gothic Neo","Arabic Typesetting","ARCHER","ARNO PRO","Arrus BT","Aurora Cn BT","AvantGarde Bk BT","AvantGarde Md BT","AVENIR","Ayuthaya","Bandy","Bangla Sangam MN","Bank Gothic","BankGothic Md BT","Baskerville","Baskerville Old Face","Batang","BatangChe","Bauer Bodoni","Bauhaus 93","Bazooka","Bell MT","Bembo","Benguiat Bk BT","Berlin Sans FB","Berlin Sans FB Demi","Bernard MT Condensed","BernhardFashion BT","BernhardMod BT","Big Caslon","BinnerD","Blackadder ITC","BlairMdITC TT","Bodoni 72","Bodoni 72 Oldstyle","Bodoni 72 Smallcaps","Bodoni MT","Bodoni MT Black","Bodoni MT Condensed","Bodoni MT Poster Compressed","Bookshelf Symbol 7","Boulder","Bradley Hand","Bradley Hand ITC","Bremen Bd BT","Britannic Bold","Broadway","Browallia New","BrowalliaUPC","Brush Script MT","Californian FB","Calisto MT","Calligrapher","Candara","CaslonOpnface BT","Castellar","Centaur","Cezanne","CG Omega","CG Times","Chalkboard","Chalkboard SE","Chalkduster","Charlesworth","Charter Bd BT","Charter BT","Chaucer","ChelthmITC Bk BT","Chiller","Clarendon","Clarendon Condensed","CloisterBlack BT","Cochin","Colonna MT","Constantia","Cooper Black","Copperplate","Copperplate Gothic","Copperplate Gothic Bold","Copperplate Gothic Light","CopperplGoth Bd BT","Corbel","Cordia New","CordiaUPC","Cornerstone","Coronet","Cuckoo","Curlz MT","DaunPenh","Dauphin","David","DB LCD Temp","DELICIOUS","Denmark","DFKai-SB","Didot","DilleniaUPC","DIN","DokChampa","Dotum","DotumChe","Ebrima","Edwardian Script ITC","Elephant","English 111 Vivace BT","Engravers MT","EngraversGothic BT","Eras Bold ITC","Eras Demi ITC","Eras Light ITC","Eras Medium ITC","EucrosiaUPC","Euphemia","Euphemia UCAS","EUROSTILE","Exotc350 Bd BT","FangSong","Felix Titling","Fixedsys","FONTIN","Footlight MT Light","Forte","FrankRuehl","Fransiscan","Freefrm721 Blk BT","FreesiaUPC","Freestyle Script","French Script MT","FrnkGothITC Bk BT","Fruitger","FRUTIGER","Futura","Futura Bk BT","Futura Lt BT","Futura Md BT","Futura ZBlk BT","FuturaBlack BT","Gabriola","Galliard BT","Gautami","Geeza Pro","Geometr231 BT","Geometr231 Hv BT","Geometr231 Lt BT","GeoSlab 703 Lt BT","GeoSlab 703 XBd BT","Gigi","Gill Sans","Gill Sans MT","Gill Sans MT Condensed","Gill Sans MT Ext Condensed Bold","Gill Sans Ultra Bold","Gill Sans Ultra Bold Condensed","Gisha","Gloucester MT Extra Condensed","GOTHAM","GOTHAM BOLD","Goudy Old Style","Goudy Stout","GoudyHandtooled BT","GoudyOLSt BT","Gujarati Sangam MN","Gulim","GulimChe","Gungsuh","GungsuhChe","Gurmukhi MN","Haettenschweiler","Harlow Solid Italic","Harrington","Heather","Heiti SC","Heiti TC","HELV","Herald","High Tower Text","Hiragino Kaku Gothic ProN","Hiragino Mincho ProN","Hoefler Text","Humanst 521 Cn BT","Humanst521 BT","Humanst521 Lt BT","Imprint MT Shadow","Incised901 Bd BT","Incised901 BT","Incised901 Lt BT","INCONSOLATA","Informal Roman","Informal011 BT","INTERSTATE","IrisUPC","Iskoola Pota","JasmineUPC","Jazz LET","Jenson","Jester","Jokerman","Juice ITC","Kabel Bk BT","Kabel Ult BT","Kailasa","KaiTi","Kalinga","Kannada Sangam MN","Kartika","Kaufmann Bd BT","Kaufmann BT","Khmer UI","KodchiangUPC","Kokila","Korinna BT","Kristen ITC","Krungthep","Kunstler Script","Lao UI","Latha","Leelawadee","Letter Gothic","Levenim MT","LilyUPC","Lithograph","Lithograph Light","Long Island","Lydian BT","Magneto","Maiandra GD","Malayalam Sangam MN","Malgun Gothic","Mangal","Marigold","Marion","Marker Felt","Market","Marlett","Matisse ITC","Matura MT Script Capitals","Meiryo","Meiryo UI","Microsoft Himalaya","Microsoft JhengHei","Microsoft New Tai Lue","Microsoft PhagsPa","Microsoft Tai Le","Microsoft Uighur","Microsoft YaHei","Microsoft Yi Baiti","MingLiU","MingLiU_HKSCS","MingLiU_HKSCS-ExtB","MingLiU-ExtB","Minion","Minion Pro","Miriam","Miriam Fixed","Mistral","Modern","Modern No. 20","Mona Lisa Solid ITC TT","Mongolian Baiti","MONO","MoolBoran","Mrs Eaves","MS LineDraw","MS Mincho","MS PMincho","MS Reference Specialty","MS UI Gothic","MT Extra","MUSEO","MV Boli","Nadeem","Narkisim","NEVIS","News Gothic","News GothicMT","NewsGoth BT","Niagara Engraved","Niagara Solid","Noteworthy","NSimSun","Nyala","OCR A Extended","Old Century","Old English Text MT","Onyx","Onyx BT","OPTIMA","Oriya Sangam MN","OSAKA","OzHandicraft BT","Palace Script MT","Papyrus","Parchment","Party LET","Pegasus","Perpetua","Perpetua Titling MT","PetitaBold","Pickwick","Plantagenet Cherokee","Playbill","PMingLiU","PMingLiU-ExtB","Poor Richard","Poster","PosterBodoni BT","PRINCETOWN LET","Pristina","PTBarnum BT","Pythagoras","Raavi","Rage Italic","Ravie","Ribbon131 Bd BT","Rockwell","Rockwell Condensed","Rockwell Extra Bold","Rod","Roman","Sakkal Majalla","Santa Fe LET","Savoye LET","Sceptre","Script","Script MT Bold","SCRIPTINA","Serifa","Serifa BT","Serifa Th BT","ShelleyVolante BT","Sherwood","Shonar Bangla","Showcard Gothic","Shruti","Signboard","SILKSCREEN","SimHei","Simplified Arabic","Simplified Arabic Fixed","SimSun","SimSun-ExtB","Sinhala Sangam MN","Sketch Rockwell","Skia","Small Fonts","Snap ITC","Snell Roundhand","Socket","Souvenir Lt BT","Staccato222 BT","Steamer","Stencil","Storybook","Styllo","Subway","Swis721 BlkEx BT","Swiss911 XCm BT","Sylfaen","Synchro LET","System","Tamil Sangam MN","Technical","Teletype","Telugu Sangam MN","Tempus Sans ITC","Terminal","Thonburi","Traditional Arabic","Trajan","TRAJAN PRO","Tristan","Tubular","Tunga","Tw Cen MT","Tw Cen MT Condensed","Tw Cen MT Condensed Extra Bold","TypoUpright BT","Unicorn","Univers","Univers CE 55 Medium","Univers Condensed","Utsaah","Vagabond","Vani","Vijaya","Viner Hand ITC","VisualUI","Vivaldi","Vladimir Script","Vrinda","Westminster","WHITNEY","Wide Latin","ZapfEllipt BT","ZapfHumnst BT","ZapfHumnst Dm BT","Zapfino","Zurich BlkEx BT","Zurich Ex BT","ZWAdobeF"];

const baseFonts = ['monospace', 'sans-serif', 'serif'];
const getChars = () => 'mmmmmmmmmmlli';
const getList = () => [...new Set([...fontList, ...extendedFontList])];
const list = getList();
const families = list.reduce((acc, font) => {
    baseFonts.forEach(baseFont => acc.push("'" + font + "', " + baseFont));
    return acc;
}, []);

// CreepJS hashMini
const hashMini = (x) => {
    if (!x) return x;
    const json = JSON.stringify(x);
    const hash = json.split('').reduce((hash, char, i) => {
        return Math.imul(31, hash) + json.charCodeAt(i) | 0;
    }, 0x811c9dc5);
    return ('0000000' + (hash >>> 0).toString(16)).substr(-8);
};

const bar = document.getElementById('progress');
const out = document.getElementById('output');

// ===== SVGRect measurement (exact CreepJS methodology) =====
function getSVGDimensions(svgText) {
    const { width, height, y } = svgText.getBBox();
    const chars = getChars();
    const { width: charWidth, height: charHeight, y: charY } = svgText.getExtentOfChar(chars[0]);
    const subString = svgText.getSubStringLength(1, 2);
    const textLen = svgText.getComputedTextLength();
    return {
        width: Math.round(width),
        height: Math.round(height),
        y: Math.round(y),
        charWidth: Math.round(charWidth),
        charHeight: Math.round(charHeight),
        charY: Math.round(charY),
        subString: Math.round(subString),
        textLen: Math.round(textLen)
    };
}

// ===== TextMetrics measurement (exact CreepJS methodology) =====
function getTextMetrics(ctx, font) {
    ctx.font = '256px ' + font;
    const m = ctx.measureText(getChars());
    return {
        ascent: Math.round(m.actualBoundingBoxAscent),
        descent: Math.round(m.actualBoundingBoxDescent),
        left: Math.round(m.actualBoundingBoxLeft),
        right: Math.round(m.actualBoundingBoxRight),
        width: Math.round(m.width),
        fontAscent: Math.round(m.fontBoundingBoxAscent),
        fontDescent: Math.round(m.fontBoundingBoxDescent)
    };
}

// ===== DOMRect measurement =====
function getRectDimensions(span, range) {
    range.selectNodeContents(span);
    const client = span.getBoundingClientRect();
    const bounding = span.getBoundingClientRect();
    let clientRange, boundingRange;
    try { clientRange = range.getBoundingClientRect(); } catch(e) { clientRange = client; }
    try { boundingRange = range.getBoundingClientRect(); } catch(e) { boundingRange = bounding; }
    return {
        client: Math.round(client.width),
        bounding: Math.round(bounding.width),
        clientRange: Math.round(clientRange.width),
        boundingRange: Math.round(boundingRange.width)
    };
}

// ===== Pixel measurement =====
function getPixelDimensions(style) {
    return {
        pixel: Math.round(parseFloat(style.inlineSize || style.width || '0')),
        size: Math.round(parseFloat(style.blockSize || style.height || '0'))
    };
}

// ===== Length measurement =====
function getLengthDimensions(span) {
    return {
        offset: span.offsetWidth,
        client: span.clientWidth,
        scroll: span.scrollWidth
    };
}

async function runAll() {
    out.textContent = 'Running all tests...\n';
    bar.style.width = '0%';
    const results = {};

    // ===== 1. SVGRect =====
    out.textContent += '\n--- SVGRect ---\n';
    bar.style.width = '10%';
    const id = 'font-fingerprint';
    const chars = getChars();
    document.getElementById(id).innerHTML =
        '<style>#' + id + '-svg-detector { position:absolute!important; left:-9999px!important; font-size:256px!important; font-style:normal!important; font-weight:normal!important; letter-spacing:normal!important; line-break:auto!important; line-height:normal!important; text-transform:none!important; text-align:left!important; text-decoration:none!important; text-shadow:none!important; white-space:normal!important; word-break:normal!important; word-spacing:normal!important; font-family:var(--font); }</style>' +
        '<svg viewBox="0 0 200 200"><text id="' + id + '-svg-detector">' + chars + '</text></svg>';

    const svgText = document.getElementById(id + '-svg-detector');
    const svgBase = {};
    baseFonts.forEach(font => {
        svgText.style.setProperty('--font', font);
        svgBase[font] = getSVGDimensions(svgText);
    });

    const svgDetected = {};  // font -> raw dimensions
    const svgCombined = new Set(), svgWidth = new Set(), svgHeight = new Set(), svgY = new Set();
    const svgCharWidth = new Set(), svgCharHeight = new Set(), svgCharY = new Set();
    const svgSubString = new Set(), svgTextLen = new Set();

    for (let i = 0; i < families.length; i++) {
        const family = families[i];
        svgText.style.setProperty('font-family', family);
        const basefont = family.split(', ')[1];
        const dims = getSVGDimensions(svgText);
        const font = family.split("'")[1];
        const b = svgBase[basefont];

        if (dims.width !== b.width || dims.height !== b.height || dims.y !== b.y ||
            dims.charWidth !== b.charWidth || dims.charHeight !== b.charHeight || dims.charY !== b.charY ||
            dims.subString !== b.subString || dims.textLen !== b.textLen) {
            svgCombined.add(font);
            svgDetected[font] = dims;
        }
        if (!isNaN(dims.width) && dims.width !== b.width) svgWidth.add(font);
        if (!isNaN(dims.height) && dims.height !== b.height) svgHeight.add(font);
        if (!isNaN(dims.y) && dims.y !== b.y) svgY.add(font);
        if (!isNaN(dims.charWidth) && dims.charWidth !== b.charWidth) svgCharWidth.add(font);
        if (!isNaN(dims.charHeight) && dims.charHeight !== b.charHeight) svgCharHeight.add(font);
        if (!isNaN(dims.charY) && dims.charY !== b.charY) svgCharY.add(font);
        if (!isNaN(dims.subString) && dims.subString !== b.subString) svgSubString.add(font);
        if (!isNaN(dims.textLen) && dims.textLen !== b.textLen) svgTextLen.add(font);

        if (i % 100 === 0) {
            bar.style.width = (10 + (i / families.length) * 20) + '%';
            await new Promise(r => setTimeout(r, 0));
        }
    }

    results.svgRect = {
        combined: { hash: hashMini([...svgCombined]), count: svgCombined.size, fonts: [...svgCombined] },
        width: { hash: hashMini([...svgWidth]), count: svgWidth.size, fonts: [...svgWidth] },
        height: { hash: hashMini([...svgHeight]), count: svgHeight.size, fonts: [...svgHeight] },
        y: { hash: hashMini([...svgY]), count: svgY.size, fonts: [...svgY] },
        charWidth: { hash: hashMini([...svgCharWidth]), count: svgCharWidth.size, fonts: [...svgCharWidth] },
        charHeight: { hash: hashMini([...svgCharHeight]), count: svgCharHeight.size, fonts: [...svgCharHeight] },
        charY: { hash: hashMini([...svgCharY]), count: svgCharY.size, fonts: [...svgCharY] },
        subString: { hash: hashMini([...svgSubString]), count: svgSubString.size, fonts: [...svgSubString] },
        textLen: { hash: hashMini([...svgTextLen]), count: svgTextLen.size, fonts: [...svgTextLen] },
        rawDimensions: svgDetected,
        baseDimensions: svgBase
    };

    out.textContent += 'SVGRect combined: ' + hashMini([...svgCombined]) + ' (' + svgCombined.size + '/' + list.length + ')\n';
    out.textContent += 'SVGRect width: ' + hashMini([...svgWidth]) + ' (' + svgWidth.size + ')\n';
    out.textContent += 'SVGRect charWidth: ' + hashMini([...svgCharWidth]) + ' (' + svgCharWidth.size + ')\n';
    out.textContent += 'SVGRect textLen: ' + hashMini([...svgTextLen]) + ' (' + svgTextLen.size + ')\n';
    out.textContent += 'SVGRect fonts: ' + [...svgCombined].join(', ') + '\n';

    // ===== 2. TextMetrics (Canvas) =====
    bar.style.width = '35%';
    out.textContent += '\n--- TextMetrics ---\n';
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    const tmBase = {};
    baseFonts.forEach(font => { tmBase[font] = getTextMetrics(ctx, font); });

    const tmDetected = {};
    const tmCombined = new Set(), tmAscent = new Set(), tmDescent = new Set();
    const tmLeft = new Set(), tmRight = new Set(), tmWidth = new Set();
    const tmFontAscent = new Set(), tmFontDescent = new Set();

    for (let i = 0; i < families.length; i++) {
        const family = families[i];
        const basefont = family.split(', ')[1];
        const dims = getTextMetrics(ctx, family);
        const font = family.split("'")[1];
        const b = tmBase[basefont];

        if (dims.ascent !== b.ascent || dims.descent !== b.descent || dims.left !== b.left ||
            dims.right !== b.right || dims.width !== b.width ||
            dims.fontAscent !== b.fontAscent || dims.fontDescent !== b.fontDescent) {
            tmCombined.add(font);
            tmDetected[font] = dims;
        }
        if (dims.ascent !== b.ascent) tmAscent.add(font);
        if (dims.descent !== b.descent) tmDescent.add(font);
        if (dims.left !== b.left) tmLeft.add(font);
        if (dims.right !== b.right) tmRight.add(font);
        if (dims.width !== b.width) tmWidth.add(font);
        if (dims.fontAscent !== b.fontAscent) tmFontAscent.add(font);
        if (dims.fontDescent !== b.fontDescent) tmFontDescent.add(font);

        if (i % 100 === 0) {
            bar.style.width = (35 + (i / families.length) * 20) + '%';
            await new Promise(r => setTimeout(r, 0));
        }
    }

    results.textMetrics = {
        combined: { hash: hashMini([...tmCombined]), count: tmCombined.size, fonts: [...tmCombined] },
        ascent: { hash: hashMini([...tmAscent]), count: tmAscent.size },
        descent: { hash: hashMini([...tmDescent]), count: tmDescent.size },
        left: { hash: hashMini([...tmLeft]), count: tmLeft.size },
        right: { hash: hashMini([...tmRight]), count: tmRight.size },
        width: { hash: hashMini([...tmWidth]), count: tmWidth.size },
        fontAscent: { hash: hashMini([...tmFontAscent]), count: tmFontAscent.size },
        fontDescent: { hash: hashMini([...tmFontDescent]), count: tmFontDescent.size },
        rawDimensions: tmDetected,
        baseDimensions: tmBase
    };

    out.textContent += 'TextMetrics combined: ' + hashMini([...tmCombined]) + ' (' + tmCombined.size + '/' + list.length + ')\n';
    out.textContent += 'TextMetrics width: ' + hashMini([...tmWidth]) + ' (' + tmWidth.size + ')\n';
    out.textContent += 'TextMetrics fonts: ' + [...tmCombined].join(', ') + '\n';

    // ===== 3. DOMRect =====
    bar.style.width = '60%';
    out.textContent += '\n--- DOMRect ---\n';
    document.getElementById(id).innerHTML =
        '<style>#' + id + '-detector { --font:""; position:absolute!important; left:-9999px!important; font-size:256px!important; font-style:normal!important; font-weight:normal!important; letter-spacing:normal!important; line-break:auto!important; line-height:normal!important; text-transform:none!important; text-align:left!important; text-decoration:none!important; text-shadow:none!important; white-space:normal!important; word-break:normal!important; word-spacing:normal!important; font-family:var(--font); }</style>' +
        '<span id="' + id + '-detector">' + chars + '</span>';

    const span = document.getElementById(id + '-detector');
    const range = document.createRange();

    const drBase = {};
    baseFonts.forEach(font => {
        span.style.setProperty('--font', font);
        drBase[font] = getRectDimensions(span, range);
    });

    const drClient = new Set(), drBounding = new Set(), drClientRange = new Set(), drBoundingRange = new Set();

    for (let i = 0; i < families.length; i++) {
        const family = families[i];
        span.style.setProperty('font-family', family);
        const basefont = family.split(', ')[1];
        const dims = getRectDimensions(span, range);
        const font = family.split("'")[1];
        const b = drBase[basefont];

        if (dims.client !== b.client) drClient.add(font);
        if (dims.bounding !== b.bounding) drBounding.add(font);
        if (dims.clientRange !== b.clientRange) drClientRange.add(font);
        if (dims.boundingRange !== b.boundingRange) drBoundingRange.add(font);

        if (i % 100 === 0) {
            bar.style.width = (60 + (i / families.length) * 10) + '%';
            await new Promise(r => setTimeout(r, 0));
        }
    }

    results.domRect = {
        client: { hash: hashMini([...drClient]), count: drClient.size, fonts: [...drClient] },
        bounding: { hash: hashMini([...drBounding]), count: drBounding.size },
        clientRange: { hash: hashMini([...drClientRange]), count: drClientRange.size },
        boundingRange: { hash: hashMini([...drBoundingRange]), count: drBoundingRange.size }
    };

    out.textContent += 'DOMRect client: ' + hashMini([...drClient]) + ' (' + drClient.size + '/' + list.length + ')\n';

    // ===== 4. Pixels =====
    bar.style.width = '75%';
    out.textContent += '\n--- Pixels ---\n';
    document.getElementById(id).innerHTML =
        '<style>#' + id + '-detector { --font:""; position:absolute!important; left:-9999px!important; font-size:256px!important; font-style:normal!important; font-weight:normal!important; letter-spacing:normal!important; line-break:auto!important; line-height:normal!important; text-transform:none!important; text-align:left!important; text-decoration:none!important; text-shadow:none!important; white-space:normal!important; word-break:normal!important; word-spacing:normal!important; font-family:var(--font); }</style>' +
        '<span id="' + id + '-detector">' + chars + '</span>';

    const pxSpan = document.getElementById(id + '-detector');
    const pxStyle = getComputedStyle(pxSpan);

    const pxBase = {};
    baseFonts.forEach(font => {
        pxSpan.style.setProperty('--font', font);
        pxBase[font] = getPixelDimensions(pxStyle);
    });

    const pxPixel = new Set(), pxSize = new Set();
    // Pixels also has perspective and transform sub-tests but they measure same thing with CSS transforms

    for (let i = 0; i < families.length; i++) {
        const family = families[i];
        pxSpan.style.setProperty('font-family', family);
        const basefont = family.split(', ')[1];
        const dims = getPixelDimensions(pxStyle);
        const font = family.split("'")[1];
        const b = pxBase[basefont];

        if (dims.pixel !== b.pixel) pxPixel.add(font);
        if (dims.size !== b.size) pxSize.add(font);

        if (i % 100 === 0) {
            bar.style.width = (75 + (i / families.length) * 10) + '%';
            await new Promise(r => setTimeout(r, 0));
        }
    }

    results.pixels = {
        pixel: { hash: hashMini([...pxPixel]), count: pxPixel.size, fonts: [...pxPixel] },
        size: { hash: hashMini([...pxSize]), count: pxSize.size }
    };

    out.textContent += 'Pixels pixel: ' + hashMini([...pxPixel]) + ' (' + pxPixel.size + '/' + list.length + ')\n';

    // ===== 5. Lengths =====
    bar.style.width = '88%';
    out.textContent += '\n--- Lengths ---\n';
    document.getElementById(id).innerHTML =
        '<style>#' + id + '-detector { --font:""; position:absolute!important; left:-9999px!important; font-size:256px!important; font-style:normal!important; font-weight:normal!important; letter-spacing:normal!important; line-break:auto!important; line-height:normal!important; text-transform:none!important; text-align:left!important; text-decoration:none!important; text-shadow:none!important; white-space:normal!important; word-break:normal!important; word-spacing:normal!important; font-family:var(--font); display:inline-block; }</style>' +
        '<span id="' + id + '-detector">' + chars + '</span>';

    const lSpan = document.getElementById(id + '-detector');
    const lBase = {};
    baseFonts.forEach(font => {
        lSpan.style.setProperty('--font', font);
        lBase[font] = getLengthDimensions(lSpan);
    });

    const lOffset = new Set(), lClient = new Set(), lScroll = new Set();

    for (let i = 0; i < families.length; i++) {
        const family = families[i];
        lSpan.style.setProperty('font-family', family);
        const basefont = family.split(', ')[1];
        const dims = getLengthDimensions(lSpan);
        const font = family.split("'")[1];
        const b = lBase[basefont];

        if (dims.offset !== b.offset) lOffset.add(font);
        if (dims.client !== b.client) lClient.add(font);
        if (dims.scroll !== b.scroll) lScroll.add(font);

        if (i % 100 === 0) {
            bar.style.width = (88 + (i / families.length) * 10) + '%';
            await new Promise(r => setTimeout(r, 0));
        }
    }

    results.lengths = {
        offset: { hash: hashMini([...lOffset]), count: lOffset.size, fonts: [...lOffset] },
        client: { hash: hashMini([...lClient]), count: lClient.size },
        scroll: { hash: hashMini([...lScroll]), count: lScroll.size }
    };

    out.textContent += 'Lengths offset: ' + hashMini([...lOffset]) + ' (' + lOffset.size + '/' + list.length + ')\n';

    // ===== 6. Diff Analysis: SVGRect vs TextMetrics =====
    bar.style.width = '98%';
    out.textContent += '\n\n===== DIFF ANALYSIS =====\n';

    const svgOnly = [...svgCombined].filter(f => !tmCombined.has(f));
    const tmOnly = [...tmCombined].filter(f => !svgCombined.has(f));
    const both = [...svgCombined].filter(f => tmCombined.has(f));

    out.textContent += 'SVG detected ' + svgCombined.size + ' fonts, TextMetrics detected ' + tmCombined.size + ' fonts\n';
    out.textContent += 'Both: ' + both.length + '\n';
    out.textContent += 'SVG-only (' + svgOnly.length + '): ' + svgOnly.join(', ') + '\n';
    out.textContent += 'TextMetrics-only (' + tmOnly.length + '): ' + tmOnly.join(', ') + '\n';

    // Show raw dimensions for SVG-only fonts
    if (svgOnly.length > 0) {
        out.textContent += '\n--- SVG-only font dimensions ---\n';
        for (const font of svgOnly) {
            const d = svgDetected[font];
            out.textContent += font + ': w=' + d.width + ' h=' + d.height + ' y=' + d.y +
                ' cw=' + d.charWidth + ' ch=' + d.charHeight + ' cy=' + d.charY +
                ' ss=' + d.subString + ' tl=' + d.textLen + '\n';
        }
    }

    results.diff = {
        svgOnly: svgOnly,
        tmOnly: tmOnly,
        svgOnlyCount: svgOnly.length,
        tmOnlyCount: tmOnly.length,
        bothCount: both.length
    };

    // ===== Summary =====
    results.meta = {
        userAgent: navigator.userAgent,
        timestamp: new Date().toISOString(),
        platform: navigator.platform,
        devicePixelRatio: window.devicePixelRatio,
        screen: { w: screen.width, h: screen.height },
        totalFonts: list.length,
        totalFamilies: families.length
    };

    // Store for copy
    window._results = results;

    bar.style.width = '100%';

    out.textContent += '\n\n===== SUMMARY =====\n';
    out.textContent += 'Total fonts tested: ' + list.length + '\n';
    out.textContent += 'SVGRect combined: ' + results.svgRect.combined.hash + ' (' + results.svgRect.combined.count + '/' + list.length + ')\n';
    out.textContent += 'TextMetrics combined: ' + results.textMetrics.combined.hash + ' (' + results.textMetrics.combined.count + '/' + list.length + ')\n';
    out.textContent += 'DOMRect client: ' + results.domRect.client.hash + ' (' + results.domRect.client.count + '/' + list.length + ')\n';
    out.textContent += 'Pixels pixel: ' + results.pixels.pixel.hash + ' (' + results.pixels.pixel.count + '/' + list.length + ')\n';
    out.textContent += 'Lengths offset: ' + results.lengths.offset.hash + ' (' + results.lengths.offset.count + '/' + list.length + ')\n';
    out.textContent += '\nTarget (Real 14PM):\n';
    out.textContent += '  SVGRect combined: eec1b551 (59/' + list.length + ')\n';
    out.textContent += '  TextMetrics combined: 187d5d1d (57/' + list.length + ')\n';
    out.textContent += '  DOMRect: eec1b551 (59/' + list.length + ')\n';
    out.textContent += '  Pixels: eec1b551 (59/' + list.length + ')\n';
    out.textContent += '  Lengths: eec1b551 (59/' + list.length + ')\n';
    out.textContent += '\nDone! Press "Copy JSON" for full data.\n';
}

function copyJSON() {
    if (!window._results) {
        out.textContent = 'Run tests first!';
        return;
    }
    const json = JSON.stringify(window._results, null, 2);
    navigator.clipboard.writeText(json).then(() => {
        out.textContent = '(Copied to clipboard)\n\n' + json;
    }).catch(() => {
        out.textContent = json;
    });
}
</script>
</body>
</html>
